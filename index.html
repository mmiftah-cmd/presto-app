<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Ops - نظام العمليات الموحد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-black: #000000;
            --card-bg: #09090b;
            --card-border: rgba(168, 85, 247, 0.15);
            --text-light: #e2e8f0;
            --text-muted: #71717a;
            --primary-purple: #a855f7;
            --deep-purple: #582b56;
            --accent-purple: #b57edc;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-light);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تلميح للمستخدم بأن العناصر قابلة للتعديل */
        [contenteditable="true"]:hover {
            outline: 1px dashed var(--primary-purple);
            background: rgba(168, 85, 247, 0.05);
            cursor: pointer;
        }
        [contenteditable="true"]:focus {
            outline: 2px solid var(--primary-purple);
            background: rgba(168, 85, 247, 0.1);
        }

        /* القائمة الجانبية - Sidebar */
        aside {
            width: 260px;
            background-color: #050507;
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            right: 0;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 40px;
            padding-right: 10px;
        }
        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--primary-purple), var(--deep-purple));
            border-radius: 8px;
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-radius: 12px;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .menu-item:hover, .menu-item.active {
            color: #ffffff;
            background-color: rgba(88, 43, 86, 0.25);
            border: 1px solid rgba(168, 85, 247, 0.15);
        }

        .menu-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* الهيكل الرئيسي للمحتوى */
        .main-content {
            margin-right: 260px;
            width: calc(100% - 260px);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* شريط التنقل العلوي - Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 20px;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 12px;
            width: 300px;
            color: #ffffff;
            font-size: 13px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            text-align: left;
            direction: ltr;
        }
        .user-name {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
        }
        .user-role {
            font-size: 11px;
            color: var(--text-muted);
        }
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--primary-purple);
            border: 2px solid var(--primary-purple);
        }

        /* لوحة الترحيب الفخمة */
        .welcome-banner {
            background: linear-gradient(135deg, rgba(88, 43, 86, 0.2) 0%, rgba(9, 9, 12, 0.6) 100%);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .welcome-wave {
            font-size: 40px;
        }
        .welcome-text h1 {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 6px;
            color: #ffffff;
        }
        .welcome-text p {
            font-size: 15px;
            color: var(--accent-purple);
        }

        /* شبكة بطاقات الإحصائيات - KPIs Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .kpi-card {
            background-color: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 20px;
            position: relative;
            transition: transform 0.2s;
        }
        .kpi-card:hover {
            border-color: var(--card-border);
            transform: translateY(-2px);
        }
        .kpi-title {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 12px;
        }
        .kpi-value {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
        }
        .kpi-sub {
            font-size: 11px;
            color: #4ade80;
            margin-top: 6px;
        }

        /* قسم الرسوم البيانية والجداول */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .section-card {
            background-color: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 24px;
        }

        .card-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .card-header-area h3 {
            font-size: 16px;
            font-weight: 700;
        }

        /* محاكاة جرافيك ذكي بالأعمدة قابل للتعديل */
        .bar-chart-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 200px;
            padding-top: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 12%;
        }
        .bar {
            width: 100%;
            background: linear-gradient(to top, var(--deep-purple), var(--primary-purple));
            border-radius: 6px 6px 0 0;
            min-height: 20px;
            transition: height 0.5s ease;
            box-shadow: 0 0 15px rgba(168,85,247,0.2);
        }
        .bar-value {
            font-size: 12px;
            font-weight: bold;
            color: var(--accent-purple);
        }
        .bar-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: -25px;
        }

        /* جدول الموظفين الفخم */
        .data-table-container {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }
        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        th {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        td {
            font-size: 13.5px;
        }
        .badge {
            background-color: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
        }
        .action-btns {
            display: flex;
            gap: 10px;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 12px;
        }
        .delete-btn:hover { opacity: 0.8; }

        .btn-premium {
            background: linear-gradient(135deg, var(--deep-purple), var(--primary-purple));
            border: 1px solid rgba(168,85,247,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* نافذة إضافة موظف منبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 24px;
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-content h3 { margin-bottom: 10px; }
        .modal-content input {
            background: #121214;
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 10px;
            color: white;
        }
    </style>
