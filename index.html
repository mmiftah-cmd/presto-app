<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الموظفين الاحترافي - محمد بن مفتاح</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background-color: #000000;
            color: #e2e8f0;
            padding: 30px;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* توهج فخم خلفي */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 60%;
            background: radial-gradient(circle, rgba(88, 43, 86, 0.15) 0%, rgba(0,0,0,0) 80%);
            pointer-events: none;
            z-index: 0;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 0 10px;
            min-height: 60px;
            position: relative;
            z-index: 1;
        }
        
        nav {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            background-color: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 8px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.25s ease-in-out;
        }
        
        .nav-btn:hover {
            color: #ffffff;
            background-color: rgba(88, 43, 86, 0.35);
            border-color: rgba(168, 85, 247, 0.2);
            box-shadow: 0 4px 15px rgba(88, 43, 86, 0.3);
            transform: translateY(-1px);
        }
        
        .nav-btn svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
        }
        
        /* ⚙️ المحرك الميكانيكي المطور والمستقر لتبديل الواجهات بـ CSS */
        .page-container {
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        .page-content {
            display: none; /* إخفاء الكل بشكل افتراضي */
        }
        
        /* إظهار الواجهة المحددة بناءً على الـ Target */
        #view-home:target,
        #view-employees:target,
        #view-calendar:target {
            display: block !important;
        }

        /* الحالة الافتراضية: إذا لم يتم اختيار أي واجهة (رابط فارغ)، تظهر الرئيسية تلقائياً */
        #view-home {
            display: block; 
        }

        /* إذا تم تفعيل أي واجهة أخرى، قم بإخفاء الواجهة الرئيسية الافتراضية */
        body:has(#view-employees:target) #view-home,
        body:has(#view-calendar:target) #view-home {
            display: none !important;
        }
        
        .table-card {
            background-color: #050505;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .table-title h3 {
            font-size: 18px;
            color: #ffffff;
            font-weight: 700;
        }
        .table-title p {
            color: #4b5563;
            font-size: 12px;
            margin-top: 4px;
        }
        
        .btn-add {
            background-color: #582b56;
            color: #ffffff;
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease-in-out;
        }
        .btn-add:hover {
            background-color: rgba(88, 43, 86, 0.7);
            opacity: 0.9;
            box-shadow: 0 4px 14px rgba(88, 43, 86, 0.4);
            transform: translateY(-1px);
        }
