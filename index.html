<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الموظفين الذكي - محمد بن مفتاح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b111e;
        }
        /* تنسيق الكبسولة البنفسجية المخملية الفخمة المطابقة للصورة تماماً */
        .nav-item-active {
            background-color: #582b56 !important;
            color: #ffffff !important;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

    <header class="bg-[#0b111e] border-b border-slate-800/60 px-8 py-5 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-0 z-50">
        
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#ff7a00] rounded-xl flex items-center justify-center text-white shadow-lg shadow-orange-600/20">
                <i class="fa-solid fa-bolt text-lg"></i>
            </div>
            <span class="text-xl font-black text-white tracking-wide">نظام الموظفين</span>
        </div>

        <nav class="flex flex-wrap items-center gap-4" id="top-navigation">
            <button class="nav-item-active flex items-center gap-2 px-5 py-2 rounded-full transition font-bold text-sm bg-transparent text-slate-400 hover:text-white border-0 outline-none cursor-pointer">
                <i class="fa-solid fa-house text-xs"></i>
                <span>الرئيسية</span>
            </button>
            <button class="flex items-center gap-2 px-5 py-2 rounded-full transition font-semibold text-sm bg-transparent text-slate-400 hover:text-white border-0 outline-none cursor-pointer">
                <i class="fa-solid fa-user-check text-xs"></i>
                <span>الحضور والغياب</span>
            </button>
            <button class="flex items-center gap-2 px-5 py-2 rounded-full transition font-semibold text-sm bg-transparent text-slate-400 hover:text-white border-0 outline-none cursor-pointer">
                <i class="fa-solid fa-calendar-plus text-xs"></i>
                <span>طلب إجازة</span>
            </button>
            <button class="flex items-center gap-2 px-5 py-2 rounded-full transition font-semibold text-sm bg-transparent text-slate-400 hover:text-white border-0 outline-none cursor-pointer">
                <i class="fa-solid fa-file-invoice-dollar text-xs"></i>
                <span>الرواتب والمستندات</span>
            </button>
        </nav>

        <div class="flex items-center gap-4">
            <div class="bg-[#ff7a00] text-white font-bold px-3 py-1.5 rounded-xl text-sm shadow-sm">
                مم
            </div>
            <div class="text-right hidden sm:block">
                <h1 class="text-sm font-black text-white">محمد بن مفتاح 👋</h1>
                <p class="text-[10px] text-slate-500">المدير المسؤول</p>
            </div>
        </div>
    </header>

    <main class="p-8 flex-1 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
        
        <div class="lg:col-span-2 space-y-8">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="bg-[#111625] border border-slate-800/50 rounded-3xl p-6 flex justify-between items-center shadow-2xl">
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-500 mb-1">ساعات العمل هذا الشهر</p>
                        <h3 class="text-2xl font-black text-white">160 ساعة</h3>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-orange-500/10 flex items-center justify-center text-[#ff7a00]"><i class="fa-solid fa-stopwatch text-xl"></i></div>
                </div>
                <div class="bg-[#111625] border border-slate-800/50 rounded-3xl p-6 flex justify-between items-center shadow-2xl">
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-500 mb-1">المهام المعلقة</p>
                        <h3 class="text-2xl font-black text-white">5 مهام</h3>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-400"><i class="fa-solid fa-folder-open text-xl"></i></div>
                </div>
            </div>
        </div>

        <div class="bg-[#111625]/40 border border-slate-800/40 rounded-3xl p-6 flex flex-col items-center justify-center text-center relative overflow-hidden shadow-2xl">
            <p class="text-xs font-semibold text-slate-400 mb-4">المساعد الذكي للنظام</p>
            
            <div class="w-full max-w-[260px] aspect-square flex items-center justify-center">

            </div>
            
            <h4 class="text-sm font-bold text-white mt-4">مرحباً بك مجدداً!</h4>
        </div>

    </main>

</body>
</html>
