<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بالمظهر البرتقالي الفخم</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif !important;
        }

        /* تأثير الحركة الفيزيائي الخاص بآبل لجميع الحركات */
        .ios-transition {
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* تنسيق إخفاء النصوص داخل القائمة افتراضياً لتبدو ناعمة */
        .sidebar-text {
            opacity: 0;
            white-space: nowrap;
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: none;
        }

        /* عند مرور الماوس على القائمة الجانبية تظهر النصوص فوراً */
        .sidebar-container:hover .sidebar-text {
            opacity: 1;
            display: inline-block;
        }

        /* إخفاء الصفحات الافتراضي بالاعتماد على الأوباسيتي والأنميشن */
        .page-content {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .page-content.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-gray-50 overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        
        <div class="sidebar-container w-20 hover:w-64 bg-slate-900 text-white flex flex-col justify-between p-4 relative z-20 shrink-0 ios-transition">
            <div>
                <div class="flex items-center space-x-reverse space-x-3 pb-6 mb-6 border-b border-slate-700 overflow-hidden h-14">
                    <i class="fa-solid fa-chart-pie text-2xl text-orange-500 min-w-[32px] text-center"></i>
                    <span class="sidebar-text text-xl font-bold tracking-wide">نظام الموظفين</span>
                </div>
                
                <div class="relative" id="sidebar-nav">
                    <div id="active-bg" class="absolute right-0 top-0 w-full h-[48px] bg-orange-500 rounded-2xl ios-transition z-0 shadow-lg shadow-orange-500/20" style="transform: translateY(0px);"></div>
                    
                    <nav class="space-y-1 relative z-10">
                        <button onclick="switchPage('home', this, 0)" class="w-full flex items-center space-x-reverse space-x-3 px-3 h-12 text-white ios-transition text-right font-medium cursor-pointer rounded-2xl overflow-hidden">
                            <i class="fa-solid fa-house text-lg min-w-[32px] text-center"></i>
                            <span class="sidebar-text">الرئيسية</span>
                        </button>
                        <button onclick="switchPage('attendance', this, 1)" class="w-full flex items-center space-x-reverse space-x-3 px-3 h-12 text-slate-400 hover:text-white ios-transition text-right font-medium cursor-pointer rounded-2xl overflow-hidden">
                            <i class="fa-solid fa-user-clock text-lg min-w-[32px] text-center"></i>
                            <span class="sidebar-text">الحضور والغياب</span>
                        </button>
                        <button onclick="switchPage('leave', this, 2)" class="w-full flex items-center space-x-reverse space-x-3 px-3 h-12 text-slate-400 hover:text-white ios-transition text-right font-medium cursor-pointer rounded-2xl overflow-hidden">
                            <i class="fa-solid fa-calendar-check text-lg min-w-[32px] text-center"></i>
                            <span class="sidebar-text">طلب إجازة</span>
                        </button>
                        <button onclick="switchPage('salary', this, 3)" class="w-full flex items-center space-x-reverse space-x-3 px-3 h-12 text-slate-400 hover:text-white ios-transition text-right font-medium cursor-pointer rounded-2xl overflow-hidden">
                            <i class="fa-solid fa-file-invoice-dollar text-lg min-w-[32px] text-center"></i>
                            <span class="sidebar-text">الرواتب والمستندات</span>
                        </button>
                    </nav>
                </div>
            </div>
            
            <div class="pt-4 border-t border-slate-700 overflow-hidden">
                <a href="#" class="flex items-center space-x-reverse space-x-3 px-3 py-2.5 rounded-2xl text-red-400 hover:bg-red-950/30 transition">
                    <i class="fa-solid fa-right-from-bracket text-lg min-w-[32px] text-center"></i>
                    <span class="sidebar-text">تسجيل الخروج</span>
                </a>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            
            <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 shrink-0">
                <div class="flex items-center space-x-reverse space-x-4">
                    <h1 class="text-xl font-semibold text-gray-800">أهلاً بك، أحمد علي</h1>
                </div>
                <div class="flex items-center space-x-reverse space-x-4">
                    <button class="relative text-gray-500 hover:text-gray-700">
                        <i class="fa-solid fa-bell text-xl"></i>
                        <span class="absolute -top-1 -left-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center">3</span>
                    </button>
                    <div class="w-10 h-10 rounded-full bg-orange-500 flex items-center justify-center text-white font-bold">أع</div>
                </div>
            </header>

            <main class="p-6 relative">
                
                <div id="home" class="page-content active space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-xs flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-gray-500">ساعات العمل هذا الشهر</p>
                                <p class="text-2xl font-bold text-gray-900 mt-1">160 ساعة</p>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-orange-50 flex items-center justify-center text-orange-600"><i class="fa-solid fa-clock text-xl"></i></div>
                        </div>
                        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-xs flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-gray-500">رصيد الإجازات المتبقي</p>
                                <p class="text-2xl font-bold text-gray-900 mt-1">14 يوم</p>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-green-50 flex items-center justify-center text-green-600"><i class="fa-solid fa-umbrella-beach text-xl"></i></div>
                        </div>
                        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-xs flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-gray-500">المهام المعلقة</p>
                                <p class="text-2xl font-bold text-gray-900 mt-1">5 مهام</p>
                            </div>
                            <div class="w-12 h-12 rounded-lg bg-amber-50 flex items-center justify-center text-amber-600"><i class="fa-solid fa-list-check text-xl"></i></div>
                        </div>
                    </div>
                </div>

                <div id="attendance" class="page-content hidden absolute w-full left-0 p-0 space-y-6">
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-xs flex justify-between items-center">
                        <div>
                            <h2 class="text-xl font-bold text-gray-800">تسجيل الحضور اليومي</h2>
                        </div>
                        <div class="flex space-x-reverse space-x-3">
                            <button class="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2.5 rounded-xl font-semibold transition cursor-pointer">تسجيل دخول</button>
                        </div>
                    </div>
                </div>

                <div id="leave" class="page-content hidden absolute w-full left-0 p-0 space-y-6">
                    <div class="max-w-2xl bg-white p-6 rounded-xl border border-gray-200 shadow-xs">
                        <h2 class="text-xl font-bold text-gray-800 mb-6">تقديم طلب إجازة جديد</h2>
                    </div>
                </div>

                <div id="salary" class="page-content hidden absolute w-full left-0 p-0 space-y-6">
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-xs max-w-md">
                        <h2 class="text-lg font-bold text-gray-800 border-b pb-3 mb-4">كشف راتب شهر يونيو 2026</h2>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script>
        function switchPage(pageId, element, index) {
            const moveY = index * 52; 
            document.getElementById('active-bg').style.transform = `translateY(${moveY}px)`;

            const buttons = document.querySelectorAll('#sidebar-nav button');
            buttons.forEach(btn => {
                btn.classList.remove('text-white');
                btn.classList.add('text-slate-400');
            });
            element.classList.remove('text-slate-400');
            element.classList.add('text-white');

            const pages = document.querySelectorAll('.page-content');
            pages.forEach(page => {
                if (page.id === pageId) {
                    page.classList.remove('hidden');
                    setTimeout(() => { page.classList.add('active'); }, 50);
                } else {
                    page.classList.remove('active');
                    page.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
