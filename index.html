<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Ops - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #09090b;
            --bg-card: #121214;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --primary: #a855f7;
            --primary-dark: #582b56;
            --success: #4ade80;
            --danger: #f87171;
            --glass-bg: rgba(18, 18, 20, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تأثير التعديل المباشر */
        [contenteditable="true"]:hover {
            outline: 1px dashed var(--primary);
            background: rgba(168, 85, 247, 0.05);
            cursor: text;
            border-radius: 4px;
        }

        /* ------------------ القائمة الجانبية ------------------ */
        aside {
            width: 250px;
            background-color: #0c0c0e;
            border-left: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
            right: 0;
            top: 0;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 900;
            padding: 0 10px;
        }
        .logo svg {
            width: 24px;
            height: 24px;
            fill: var(--primary);
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(168, 85, 247, 0.1);
            color: var(--text-main);
        }
        .nav-item svg {
            width: 18px; height: 18px; fill: currentColor;
        }

        /* ------------------ المحتوى الرئيسي ------------------ */
        .main-wrapper {
            margin-right: 250px;
            width: calc(100% - 250px);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* الشريط العلوي */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 12px;
            width: 300px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-box input {
            background: none; border: none; outline: none;
            color: var(--text-main); width: 100%; font-family: 'Cairo';
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .icon-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: var(--text-muted);
        }
        .profile {
            display: flex; align-items: center; gap: 12px;
            background: rgba(168, 85, 247, 0.05);
            padding: 6px 16px 6px 6px;
            border-radius: 30px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

            width: 32px; height: 32px; border-radius: 50%;
