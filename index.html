<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الموظفين الاحترافي - محمد بن مفتاح</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background-color: #000000;
            color: #e2e8f0;
            padding: 30px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 0 10px;
            min-height: 60px;
        }
        
        nav {
            display: flex;
            gap: 12px;
        }
        
        .nav-btn {
            background-color: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 8px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.25s ease-in-out;
            cursor: pointer;
        }
        
        /* إخفاء أيقونة زر الرئيسية فقط وتوسيط النص */
        .home-nav-btn {
            gap: 0px !important;
            justify-content: center;
        }
        .home-nav-btn svg {
            display: none !important;
        }
        
        .nav-btn:hover {
            color: #ffffff;
            background-color: rgba(88, 43, 86, 0.35);
            border-color: rgba(168, 85, 247, 0.2);
            box-shadow: 0 4px 15px rgba(88, 43, 86, 0.3);
            transform: translateY(-1px);
        }
        
        .nav-btn svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
        }
        
        /* إخفاء الصفحات افتراضياً ليتم التحكم بها عبر الجافاسكربت */
        .page-container {
            width: 100%;
            position: relative;
        }
        .page-content {
            display: none; 
        }
        
        .table-card {
            background-color: #050505;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .table-title h3 {
            font-size: 18px;
            color: #ffffff;
            font-weight: 700;
        }
        
        .table-title p {
            color: #4b5563;
            font-size: 12px;
            margin-top: 4px;
        }
        
        .btn-add {
            background-color: #582b56;
            color: #ffffff;
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease-in-out;
        }
        
        .btn-add:hover {
            background-color: rgba(88, 43, 86, 0.7);
            box-shadow: 0 4px 14px rgba(88, 43, 86, 0.4);
            transform: translateY(-1px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }
        
        th, td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        th {
            color: #6b7280;
            font-size: 13px;
            font-weight: 700;
        }
        
        td {
            font-size: 14px;
        }
        
        .emp-name {
            color: #ffffff;
            font-weight: 700;
        }
        
        .badge-status {
            background-color: rgba(34, 197, 94, 0.08);
            color: #4ade80;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }
        
        .btn-action {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .btn-action:hover {
            opacity: 0.6;
            background-color: rgba(255, 255, 255, 0.02);
        }
        
        .calendar-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .calendar-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .cal-arrow-btn {
            background-color: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .cal-arrow-btn:hover {
            background-color: #582b56;
        }
        
        .month-year-badge {
            background-color: #582b56;
            padding: 6px 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            color: #ffffff;
            min-width: 120px;
            text-align: center;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        
        .cal-header {
            color: #6b7280;
            font-weight: 700;
            text-align: center;
            font-size: 13px;
        }
