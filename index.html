<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الموظفين الاحترافي - محمد بن مفتاح</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }
        
        /* خلفية سوداء حقيقية بالكامل للموقع */
        body {
            background-color: #000000;
            color: #e2e8f0;
            padding: 30px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 0 10px;
            min-height: 60px;
        }
        
        nav {
            display: flex;
            gap: 12px;
        }
        
        .nav-btn {
            background-color: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 8px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.25s ease-in-out;
        }
        
        .nav-btn:hover {
            color: #ffffff;
            background-color: rgba(88, 43, 86, 0.35);
            border-color: rgba(168, 85, 247, 0.2);
            box-shadow: 0 4px 15px rgba(88, 43, 86, 0.3);
            transform: translateY(-1px);
        }
        
        .nav-btn svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
        }
        
        /* المحرك الميكانيكي الحصري بـ CSS لتبديل الواجهات */
        .page-container {
            width: 100%;
            position: relative;
        }
        .page-content {
            display: none;
        }
        
        #view-home {
            display: block;
        }
        
        #view-home:target,
        #view-employees:target,
        #view-calendar:target {
            display: block !important;
        }
        
        #view-employees:target ~ #view-home,
        #view-calendar:target ~ #view-home {
            display: none !important;
        }
