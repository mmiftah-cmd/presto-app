<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم إدارة الموظفين - محمد بن مفتاح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif !important;
        }

        /* منحنى حركة فيزيائي فخم وناعم جداً للتمدد والانكماش */
        .ios-sidebar-transition {
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* كود السحر البصري: إخفاء النص عبر تحجيم العرض والشفافية معاً لتجنب القفز المفاجئ */
        .sidebar-text {
            max-width: 0;
            opacity: 0;
            white-space: nowrap;
            display: inline-block;
            overflow: hidden;
            transition: max-width 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* عند تمرير الماوس، تتمدد النصوص تدريجياً بالتزامن مع تمدد القائمة الجانبية */
        .sidebar-container:hover .sidebar-text {
            max-width: 150px; /* يعطي مساحة كافية للنص ليتمدد بنعومة */
            opacity: 1;
        }

        /* حركة الكبسولة البنفسجية المتزحلقة */
        .ios-transition {
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* أنميشن ظهور محتوى لوحة التحكم بتأثير الـ Blur والتلاشي والانزلاق */
        .page-content {
            opacity: 0;
            filter: blur(4px);
            transform: translateY(10px);
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .page-content.active {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-[#f4f5f8] text-slate-900 overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        
        <div class="sidebar-container w-22 hover:w-64 bg-[#090d16] text-white flex flex-col justify-between p-4 relative z-20 shrink-0 ios-sidebar-transition shadow-2xl">
            <div>
                <div class="flex items-center space-x-reverse space-x-3 pb-6 mb-6 border-b border-slate-800/60 overflow-hidden h-14">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-purple-500/30 shrink-0">
                        <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="14" y1="4" x2="8" y2="10" />
                            <path d="M18 8 L12 14 A 3 3 0 0 1 7 14 A 3 3 0 0 1 12 14" />
                        </svg>
                    </div>
                    <span class="sidebar-text text-xl font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">نظام الموظفين</span>
                </div>
                
                <div class="relative" id="sidebar-nav">
                    <div id="active-bg" class="absolute right-0 top-0 w-full h-12 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-2xl ios-transition z-0 shadow-[0_8px_24px_rgba(147,51,234,0.4)]" style="transform: translateY(0px);"></div>
                    
                    <nav class="space-y-2 relative z-10">
                        <button onclick="switchPage('home', this)" class="w-full flex items-center space-x-reverse space-x-4 px-4 h-12 text-white ios-transition text-right font-bold cursor-pointer rounded-2xl overflow-hidden bg-transparent border-0 outline-none">
                            <i class="fa-solid fa-layer-group text-lg min-w-[28px] text-center"></i>
                            <span class="sidebar-text mr-2">الرئيسية</span>
                        </button>
                        <button onclick="switchPage('employees', this)" class="w-full flex items-center space-x-reverse space-x-4 px-4 h-12 text-slate-400 hover:text-white ios-transition text-right font-bold cursor-pointer rounded-2xl overflow-hidden bg-transparent border-0 outline-none">
                            <i class="fa-solid fa-users text-lg min-w-[28px] text-center"></i>
                            <span class="sidebar-text mr-2">الموظفون</span>
                        </button>
                        <button onclick="switchPage('attendance', this)" class="w-full flex items-center space-x-reverse space-x-4 px-4 h-12 text-slate-400 hover:text-white ios-transition text-right font-bold cursor-pointer rounded-2xl overflow-hidden bg-transparent border-0 outline-none">
                            <i class="fa-solid fa-fingerprint text-lg min-w-[28px] text-center"></i>
                            <span class="sidebar-text mr-2">الحضور والغياب</span>
                        </button>
                        <button onclick="switchPage('leave', this)" class="w-full flex items-center space-x-reverse space-x-4 px-4 h-12 text-slate-400 hover:text-white ios-transition text-right font-bold cursor-pointer rounded-2xl overflow-hidden bg-transparent border-0 outline-none">
                            <i class="fa-solid fa-calendar-minus text-lg min-w-[28px] text-center"></i>
                            <span class="sidebar-text mr-2">طلب إجازة</span>
                        </button>
                        <button onclick="switchPage('salary', this)" class="w-full flex items-center space-x-reverse space-x-4 px-4 h-12 text-slate-400 hover:text-white ios-transition text-right font-bold cursor-pointer rounded-2xl overflow-hidden bg-transparent border-0 outline-none">
                            <i class="fa-solid fa-wallet text-lg min-w-[28px] text-center"></i>
                            <span class="sidebar-text mr-2">الرواتب والمستندات</span>
                        </button>
                    </nav>
                </div>
            </div>
            
            <div class="pt-4 border-t border-slate-800/60 overflow-hidden">
                <a href="#" class="flex items-center space-x-reverse space-x-4 px-4 py-3 rounded-2xl text-rose-400 hover:bg-rose-500/10 transition duration-300 no-underline">
                    <i class="fa-solid fa-arrow-right-from-bracket text-lg min-w-[28px] text-center"></i>
                    <span class="sidebar-text font-bold mr-2">تسجيل الخروج</span>
                </a>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 h-20 flex items-center justify-between px-8 shrink-0 z-10">
                <div>
                    <h1 class="text-2xl font-extrabold text-[#090d16] tracking-tight">أهلاً بك، محمد بن مفتاح 👋</h1>
                    <p class="text-xs font-medium text-slate-400 mt-0.5">مرحباً بك في نظام إدارة الموظفين الذكي والملكي الخاص بك</p>
                </div>
                <div class="flex items-center space-x-reverse space-x-5">
                    <button class="relative w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-400 hover:text-purple-600 hover:scale-105 ios-transition bg-transparent outline-none">
                        <i class="fa-solid fa-bell text-base"></i>
                        <span class="absolute top-2 left-2 bg-purple-600 w-2 h-2 rounded-full animate-ping"></span>
                    </button>
                    <div class="w-11 h-11 rounded-xl bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center text-white font-extrabold shadow-md shadow-purple-500/20 text-sm">مم</div>
                </div>
            </header>

            <main class="p-8 flex-1 overflow-y-auto relative">
                
                <div id="home" class="page-content active space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-[0_10px_30px_rgba(0,0,0,0.01)] flex items-center justify-between hover:scale-[1.01] ios-transition">
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">ساعات العمل هذا الشهر</p>
                                <p class="text-3xl font-extrabold text-slate-900 mt-1.5">160 ساعة</p>
                            </div>
                            <div class="w-14 h-14 rounded-2xl bg-purple-50 flex items-center justify-center text-purple-600 shadow-inner"><i class="fa-solid fa-stopwatch text-xl"></i></div>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-[0_10px_30px_rgba(0,0,0,0.01)] flex items-center justify-between hover:scale-[1.01] ios-transition">
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">رصيد الإجازات المتبقي</p>
                                <p class="text-3xl font-extrabold text-slate-900 mt-1.5">14 يوم</p>
                            </div>
                            <div class="w-14 h-14 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600 shadow-inner"><i class="fa-solid fa-plane-departure text-xl"></i></div>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-[0_10px_30px_rgba(0,0,0,0.01)] flex items-center justify-between hover:scale-[1.01] ios-transition">
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">المهام المعلقة</p>
                                <p class="text-3xl font-extrabold text-slate-900 mt-1.5">5 مهام</p>
                            </div>
                            <div class="w-14 h-14 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-700 shadow-inner"><i class="fa-solid fa-folder-open text-xl"></i></div>
                        </div>
                    </div>
                </div>

                <div id="employees" class="page-content hidden space-y-6">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-3xl border border
