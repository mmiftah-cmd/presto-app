<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بنظام حركة iOS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif !important;
        }

        /* تأثير الحركة الخاص بآبل (Cubic Bezier) لمنح تفاعل فيزيائي ناعم */
        .ios-transition {
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* إخفاء الصفحات الافتراضي */
        .page-content {
            display: none;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* تأثير ظهور الصفحة بنعومة وصعود خفيف */
        .page-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-gray-50 overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        
        <div class="w-64 bg-slate-900 text-white flex flex-col justify-between p-4 relative z-20">
            <div>
                <div class="flex items-center space-x-reverse space-x-2 pb-6 mb-6 border-b border-slate-700">
                    <i class="fa-solid fa-chart-pie text-2xl text-blue-400"></i>
                    <span class="text-xl font-bold tracking-wide">نظام الموظفين</span>
                </div>
                
                <div class="relative" id="sidebar-nav">
                    <div id="active-bg" class="absolute right-0 top-0 w-full h-[48px] bg-blue-600 rounded-lg ios-transition z-0" style="transform: translateY(0px);"></div>
                    
                    <nav class="space-y-1 relative z-10">
                        <button onclick="switchPage('home', this, 0)" class="w-full flex items-center space-x-reverse space-x-3 px-4 h-12 text-white ios-transition text-right font-medium cursor-pointer rounded-lg">
                            <i class="fa-solid fa-house w-5"></i>
                            <span>الرئيسية</span>
                        </button>
                        <button onclick="switchPage('attendance', this, 1)" class="w-full flex items-center space-x-reverse space-x-3 px-4 h-12 text-slate-400 hover:text-white ios-transition text-right font-medium cursor-pointer rounded-lg">
                            <i class="fa-solid fa-user-clock w-5"></i>
                            <span>الحضور والغياب</span>
                        </button>
                        <button onclick="switchPage('leave', this, 2)" class="w-full flex items-center space-x-reverse space-x-3 px-4 h-12 text-slate-400 hover:text-white ios-transition text-right font-medium cursor-pointer rounded-lg">
                            <i class="fa-solid fa-calendar-check w-5"></i>
                            <span>طلب إجازة</span>
                        </button>
                        <button onclick="switchPage('salary', this, 3)" class="w-full flex items-center space-x-reverse space-x-3 px-4 h-12 text-slate-400 hover:text-white ios-transition text-right font-medium cursor-pointer rounded-lg">
                            <i class="fa-solid fa-file-invoice-dollar w-5"></i>
                            <span>الرواتب والمستندات</span>
                        </button>
                    </nav>
                </div>
            </div>
            
            <div class="pt-4 border-t border-slate-700">
                <a href="#" class="flex items-center space-x-reverse space-x-3 px-4 py-2.5 rounded-lg text-red-400 hover:bg-red-950/30 transition">
                    <i class="fa-solid fa-right-from-bracket w-5"></i>
                    <span>تسجيل الخروج</span>
                </a>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            
            <header class="bg-white border-b border-gray-200
