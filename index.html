<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الموظفين الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b111e;
        }
        /* تدرج زر التنقل النشط باللون البرتقالي كما في الصورة */
        .sidebar-item-active {
            background: linear-gradient(90deg, #ff7a00 0%, #ff9500 100%);
            box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex">

    <aside class="w-72 bg-[#0d1527] border-l border-slate-800 flex flex-col justify-between p-4 hidden md:flex">
        <div>
            <div class="flex items-center gap-3 px-3 py-6 border-b border-slate-800 mb-6">
                <div class="w-10 h-10 bg-[#ff7a00] rounded-xl flex items-center justify-center text-white shadow-lg shadow-orange-600/20">
                    <i class="fa-solid fa-bolt text-lg"></i>
                </div>
                <span class="text-xl font-black text-white tracking-wide">نظام الموظفين</span>
            </div>

            <nav class="space-y-2">
                <a href="#" class="flex items-center justify-between sidebar-item-active text-white px-4 py-3.5 rounded-2xl transition font-bold">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-house text-lg"></i>
                        <span>الرئيسية</span>
                    </div>
                </a>
                <a href="#" class="flex items-center justify-between text-slate-400 hover:text-white hover:bg-slate-800/40 px-4 py-3.5 rounded-2xl transition font-medium">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-user-check text-lg"></i>
                        <span>الحضور والغياب</span>
                    </div>
                </a>
                <a href="#" class="flex items-center justify-between text-slate-400 hover:text-white hover:bg-slate-800/40 px-4 py-3.5 rounded-2xl transition font-medium">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-calendar-plus text-lg"></i>
                        <span>طلب إجازة</span>
                    </div>
                </a>
                <a href="#" class="flex items-center justify-between text-slate-400 hover:text-white hover:bg-slate-800/40 px-4 py-3.5 rounded-2xl transition font-medium">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-file-invoice-dollar text-lg"></i>
                        <span>الرواتب والمستندات</span>
                    </div>
                </a>
            </nav>
        </div>

        <div class="border-t border-slate-800 pt-4">
            <a href="#" class="flex items-center gap-3 text-rose-400 hover:bg-rose-500/10 px-4 py-3.5 rounded-2xl transition font-bold">
                <i class="fa-solid fa-arrow-right-from-bracket text-lg"></i>
                <span>تسجيل الخروج</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        
        <header class="bg-[#0d1527]/60 backdrop-blur-md border-b border-slate-800 px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-slate-800 p-2.5 rounded-xl text-slate-400 hover:text-white transition cursor-pointer relative">
                    <i class="fa-solid fa-bell text-lg"></i>
                    <span class="w-2 h-2 bg-orange-500 rounded-full absolute top-2 left-2.5"></span>
                </div>
                <div class="bg-[#ff7a00] text-white font-bold px-3 py-1.5 rounded-xl text-sm shadow-sm">
                    أع
                </div>
            </div>
            
            <div class="text-right">
                <h1 class="text-xl font-black text-white flex items-center gap-2 justify-end">
                    أهلاً بك، أحمد علي <span class="animate-bounce">👋</span>
                </h1>
                <p class="text-xs text-slate-400 mt-0.5">مرحباً بك في نظام إدارة الموظفين الذكي</p>
            </div>
        </header>

        <div class="p-8 space-y-8 flex-1 overflow-y-auto">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-[#0d1527] border border-slate-800/80 rounded-3xl p-6 flex justify-between items-center shadow-lg hover:border-slate-700 transition">
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-400 mb-1">ساعات العمل هذا الشهر</p>
                        <h3 class="text-2xl font-black text-white">160 ساعة</h3>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-orange-500/10 flex items-center justify-center text-[#ff7a00]">
                        <i class="fa-solid fa-stopwatch text-xl"></i>
                    </div>
                </div>

                <div class="bg-[#0d1527] border border-slate-800/80 rounded-3xl p-6 flex justify-between items-center shadow-lg hover:border-slate-700 transition">
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-400 mb-1">رصيد الإجازات المتبقي</p>
                        <h3 class="text-2xl font-black text-white">14 يوم</h3>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-400">
                        <i class="fa-solid fa-plane-departure text-xl"></i>
                    </div>
                </div>

                <div class="bg-[#0d1527] border border-slate-800/80 rounded-3xl p-6 flex justify-between items-center shadow-lg hover:border-slate-700 transition">
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-400 mb-1">المهام المعلقة</p>
                        <h3 class="text-2xl font-black text-white">5 مهام</h3>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-400">
                        <i class="fa-solid fa-folder-open text-xl"></i>
                    </div>
                </div>
            </div>
